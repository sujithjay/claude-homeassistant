
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ── Additional Dashboards ────────────────────────────────────────────────────
lovelace:
  mode: storage
  dashboards:
    rounded-home:
      mode: yaml
      filename: lovelace/dashboard.yaml
      title: "Meriden"
      icon: mdi:home-variant-outline
      show_in_sidebar: true
      require_admin: false


# ── Helpers ──────────────────────────────────────────────────────────────────
input_boolean:
  light_auto_mode:
    name: "Light Auto Mode"
    initial: true
    icon: mdi:calendar-sync


# ── Template Sensors (used by dashboard) ────────────────────────────────────
template:
  - sensor:
      - name: "Nursery Alerts Active"
        icon: mdi:baby-face-outline
        state: >
          {% set crying = is_state('binary_sensor.nursery_baby_crying', 'on') %}
          {% set motion = is_state('binary_sensor.nursery_motion', 'on') %}
          {% set person = is_state('binary_sensor.nursery_person', 'on') %}
          {% set pet    = is_state('binary_sensor.nursery_pet', 'on') %}
          {% set count  = [crying, motion, person, pet] | select('equalto', true) | list | count %}
          {{ count }}
        unit_of_measurement: "alerts"
