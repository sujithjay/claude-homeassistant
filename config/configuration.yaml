
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# ── Additional Dashboards ────────────────────────────────────────────────────
lovelace:
  mode: storage
  dashboards:
    rounded-home:
      mode: yaml
      filename: lovelace/dashboard.yaml
      title: "Meriden"
      icon: mdi:home-variant-outline
      show_in_sidebar: true
      require_admin: false

# ── HomeKit Bridge ───────────────────────────────────────────────────────────
homekit:
  - name: "Meriden"
    port: 21063
    filter:
      include_entities:
        # Living room
        - switch.light_switch
        # Nursery sensors
        - binary_sensor.nursery_baby_crying
        - binary_sensor.nursery_motion
        - binary_sensor.nursery_person
        - binary_sensor.nursery_pet
        - light.nursery_status_led
        # Bedroom environment
        - sensor.aqara_humidity_temperature
        - sensor.aqara_humidity_humidity
        - sensor.aqara_humidity_pressure
        # Media
        - media_player.lg_webos_tv_oled65c3pua
        - media_player.family_room_display
    entity_config:
      sensor.aqara_humidity_temperature:
        linked_battery_sensor: sensor.aqara_humidity_battery
      sensor.aqara_humidity_humidity:
        linked_battery_sensor: sensor.aqara_humidity_battery
      sensor.aqara_humidity_pressure:
        linked_battery_sensor: sensor.aqara_humidity_battery

# ── Helpers ──────────────────────────────────────────────────────────────────
input_boolean:
  light_auto_mode:
    name: "Light Auto Mode"
    initial: true
    icon: mdi:calendar-sync


# ── Template Sensors (used by dashboard) ────────────────────────────────────
template:
  - sensor:
      - name: "Nursery Alerts Active"
        icon: mdi:baby-face-outline
        state: >
          {% set crying = is_state('binary_sensor.nursery_baby_crying', 'on') %}
          {% set motion = is_state('binary_sensor.nursery_motion', 'on') %}
          {% set person = is_state('binary_sensor.nursery_person', 'on') %}
          {% set pet    = is_state('binary_sensor.nursery_pet', 'on') %}
          {% set count  = [crying, motion, person, pet] | select('equalto', true) | list | count %}
          {{ count }}
        unit_of_measurement: "alerts"
