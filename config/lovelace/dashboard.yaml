title: Meriden
views:
  ##############################################################################
  # VIEW 1: HOME OVERVIEW
  ##############################################################################
  - title: Home
    path: home
    icon: mdi:home-variant
    type: masonry
    cards:
      # ── Greeting ─────────────────────────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: >
          {% set h = now().hour %}
          Good {% if h < 12 %}morning{% elif h < 17 %}afternoon{% else %}evening{% endif %}, Jay!
        subtitle: "{{ now().strftime('%A, %B %-d') }}"

      # ── Weather ───────────────────────────────────────────────────────────────
      - type: custom:weather-card
        entity: weather.forecast_home
        number_of_forecasts: 5

      # ── Quick-glance chips (dynamic colors) ──────────────────────────────────
      - type: custom:mushroom-chips-card
        chips:
          - type: weather
            entity: weather.forecast_home
            show_temperature: true
            show_conditions: true
          - type: spacer
          - type: template
            entity: sensor.aqara_humidity_temperature
            icon: mdi:thermometer
            icon_color: >
              {% set t = states('sensor.aqara_humidity_temperature') | float(0) %}
              {% if t > 75 %}red{% elif t > 65 %}orange{% else %}light-blue{% endif %}
            content: "{{ states('sensor.aqara_humidity_temperature') | round(1) }}°"
          - type: template
            entity: sensor.aqara_humidity_humidity
            icon: mdi:water-percent
            icon_color: >
              {% set h = states('sensor.aqara_humidity_humidity') | float(0) %}
              {% if h > 60 %}blue{% elif h > 40 %}teal{% else %}amber{% endif %}
            content: "{{ states('sensor.aqara_humidity_humidity') | round(0) | int }}%"

      # ── Presence ──────────────────────────────────────────────────────────────
      - type: custom:mushroom-person-card
        entity: person.jay
        name: Jay
        layout: horizontal

      # ── Sun times ─────────────────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.sun_next_rising
            name: Sunrise
            icon: mdi:weather-sunset-up
            icon_color: yellow
            secondary_info: none
          - type: custom:mushroom-entity-card
            entity: sensor.sun_next_setting
            name: Sunset
            icon: mdi:weather-sunset-down
            icon_color: orange
            secondary_info: none

      # ── Media ─────────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Media
        icon: mdi:television-play

      - type: custom:bubble-card
        card_type: media-player
        entity: media_player.family_room_display
        name: Family Room Display
        icon: mdi:cast
        show_state: true
        card_layout: large

      - type: custom:bubble-card
        card_type: media-player
        entity: media_player.lg_webos_tv_oled65c3pua
        name: LG TV (65" C3)
        icon: mdi:television
        show_state: true
        card_layout: large

      # ── Navigation ────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: horizontal-buttons-stack
        auto_order: true
        1_name: Home
        1_icon: mdi:home-variant
        1_link: /rounded-home/home
        1_entity: person.jay
        2_name: Nursery
        2_icon: mdi:baby-carriage
        2_link: /rounded-home/nursery
        2_entity: binary_sensor.nursery_baby_crying
        2_pir_sensor: binary_sensor.nursery_motion
        3_name: Energy
        3_icon: mdi:lightning-bolt
        3_link: /rounded-home/energy
        3_entity: switch.light_switch
        4_name: System
        4_icon: mdi:cog-outline
        4_link: /rounded-home/system

  ##############################################################################
  # VIEW 2: NURSERY
  ##############################################################################
  - title: Nursery
    path: nursery
    icon: mdi:baby-carriage
    type: masonry
    cards:
      # ── Greeting ─────────────────────────────────────────────────────────────
      - type: custom:mushroom-title-card
        title: Nursery
        subtitle: Baby Monitor & Controls

      # ── Alert chips (dynamic colors) ─────────────────────────────────────────
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            icon: mdi:baby-face-outline
            icon_color: >
              {{ 'red' if is_state('binary_sensor.nursery_baby_crying', 'on') else 'grey' }}
            content: >
              {{ 'Crying!' if is_state('binary_sensor.nursery_baby_crying', 'on') else 'Quiet' }}
          - type: template
            entity: binary_sensor.nursery_motion
            icon: mdi:motion-sensor
            icon_color: >
              {{ 'amber' if is_state('binary_sensor.nursery_motion', 'on') else 'grey' }}
            content: >
              {{ 'Motion' if is_state('binary_sensor.nursery_motion', 'on') else '' }}
          - type: template
            entity: binary_sensor.nursery_person
            icon: mdi:account
            icon_color: >
              {{ 'deep-purple' if is_state('binary_sensor.nursery_person', 'on') else 'grey' }}
            content: >
              {{ 'Person' if is_state('binary_sensor.nursery_person', 'on') else '' }}
          - type: template
            entity: binary_sensor.nursery_pet
            icon: mdi:paw
            icon_color: >
              {{ 'green' if is_state('binary_sensor.nursery_pet', 'on') else 'grey' }}
            content: >
              {{ 'Pet' if is_state('binary_sensor.nursery_pet', 'on') else '' }}

      # ── Baby alert card (tinted background when crying) ───────────────────────
      - type: custom:mushroom-template-card
        primary: >
          {% if is_state('binary_sensor.nursery_baby_crying', 'on') %}Baby is crying!{% else %}All quiet{% endif %}
        secondary: Baby monitor status
        icon: >
          {% if is_state('binary_sensor.nursery_baby_crying', 'on') %}mdi:account-voice{% else %}mdi:sleep{% endif %}
        icon_color: >
          {% if is_state('binary_sensor.nursery_baby_crying', 'on') %}red{% else %}green{% endif %}
        badge_icon: >
          {% if is_state('binary_sensor.nursery_motion', 'on') %}mdi:motion-sensor{% endif %}
        badge_color: amber
        layout: horizontal
        card_mod:
          style: |
            :host {
              --ha-card-background: {{ 'rgba(239, 68, 68, 0.12)' if is_state('binary_sensor.nursery_baby_crying', 'on') else 'var(--ha-card-background)' }};
              border: {{ '1px solid rgba(239, 68, 68, 0.4)' if is_state('binary_sensor.nursery_baby_crying', 'on') else '0px solid transparent' }};
            }

      # ── Environment ───────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Environment
        icon: mdi:thermometer-lines

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.aqara_humidity_temperature
            name: Temperature
            icon: mdi:thermometer
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.aqara_humidity_humidity
            name: Humidity
            icon: mdi:water-percent
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.aqara_humidity_pressure
            name: Pressure
            icon: mdi:gauge
            icon_color: indigo

      - type: custom:mini-graph-card
        entities:
          - entity: sensor.aqara_humidity_temperature
            name: Temperature
            color: "#fb923c"
          - entity: sensor.aqara_humidity_humidity
            name: Humidity
            color: "#60a5fa"
            y_axis: secondary
        name: Nursery Environment (24h)
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        hour24: true
        show:
          icon: false
          state: true
          legend: true
          extrema: true
          fill: false

      # ── Camera ────────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Camera
        icon: mdi:cctv

      - type: custom:mushroom-select-card
        entity: select.nursery_day_night_mode
        name: Day / Night Mode
        icon: mdi:camera-iris

      - type: horizontal-stack
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.nursery_infrared_lights_in_night_mode
            name: IR Lights
            icon: mdi:led-strip-variant
            styles: |
              .bubble-icon-container {
                background: rgba(139, 92, 246, ${state === 'on' ? '0.35' : '0.1'}) !important;
              }
              .bubble-icon { color: rgb(139, 92, 246) !important; }
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.nursery_privacy_mode
            name: Privacy
            icon: mdi:eye-off-outline
            styles: |
              .bubble-icon-container {
                background: rgba(239, 68, 68, ${state === 'on' ? '0.35' : '0.1'}) !important;
              }
              .bubble-icon { color: rgb(239, 68, 68) !important; }

      - type: horizontal-stack
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.nursery_record
            name: Record Video
            icon: mdi:video
            styles: |
              .bubble-icon-container {
                background: rgba(239, 68, 68, ${state === 'on' ? '0.35' : '0.1'}) !important;
              }
              .bubble-icon { color: rgb(239, 68, 68) !important; }
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.nursery_record_audio
            name: Record Audio
            icon: mdi:microphone
            styles: |
              .bubble-icon-container {
                background: rgba(236, 72, 153, ${state === 'on' ? '0.35' : '0.1'}) !important;
              }
              .bubble-icon { color: rgb(236, 72, 153) !important; }

      - type: custom:mushroom-number-card
        entity: number.nursery_volume
        name: Camera Volume
        icon: mdi:volume-high
        display_mode: slider

      # ── Alerts & Notifications ────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Alerts & Notifications
        icon: mdi:bell-ring

      - type: horizontal-stack
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.nursery_push_notifications
            name: Push Alerts
            icon: mdi:bell
            styles: |
              .bubble-icon-container {
                background: rgba(59, 130, 246, ${state === 'on' ? '0.35' : '0.1'}) !important;
              }
              .bubble-icon { color: rgb(59, 130, 246) !important; }
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.nursery_email_on_event
            name: Email Alerts
            icon: mdi:email
            styles: |
              .bubble-icon-container {
                background: rgba(20, 184, 166, ${state === 'on' ? '0.35' : '0.1'}) !important;
              }
              .bubble-icon { color: rgb(20, 184, 166) !important; }

      - type: horizontal-stack
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.nursery_siren_on_event
            name: Siren on Event
            icon: mdi:alarm-bell
            styles: |
              .bubble-icon-container {
                background: rgba(239, 68, 68, ${state === 'on' ? '0.35' : '0.1'}) !important;
              }
              .bubble-icon { color: rgb(239, 68, 68) !important; }
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.nursery_guard_return
            name: Guard Return
            icon: mdi:shield-home
            styles: |
              .bubble-icon-container {
                background: rgba(34, 197, 94, ${state === 'on' ? '0.35' : '0.1'}) !important;
              }
              .bubble-icon { color: rgb(34, 197, 94) !important; }

      # ── Status LED ────────────────────────────────────────────────────────────
      - type: custom:mushroom-light-card
        entity: light.nursery_status_led
        name: Status LED
        icon: mdi:led-outline

      # ── Navigation ────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: horizontal-buttons-stack
        auto_order: true
        1_name: Home
        1_icon: mdi:home-variant
        1_link: /rounded-home/home
        1_entity: person.jay
        2_name: Nursery
        2_icon: mdi:baby-carriage
        2_link: /rounded-home/nursery
        2_entity: binary_sensor.nursery_baby_crying
        2_pir_sensor: binary_sensor.nursery_motion
        3_name: Energy
        3_icon: mdi:lightning-bolt
        3_link: /rounded-home/energy
        3_entity: switch.light_switch
        4_name: System
        4_icon: mdi:cog-outline
        4_link: /rounded-home/system

  ##############################################################################
  # VIEW 3: ENERGY
  ##############################################################################
  - title: Energy
    path: energy
    icon: mdi:lightning-bolt
    type: masonry
    cards:
      - type: custom:mushroom-title-card
        title: Energy Monitor
        subtitle: Real-time power consumption

      # ── Power trend chart ─────────────────────────────────────────────────────
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.light_switch_power
            name: Power
        name: Power Usage — Last 24h
        hours_to_show: 24
        points_per_hour: 6
        line_width: 2
        hour24: true
        color_thresholds:
          - value: 0
            color: "#60a5fa"
          - value: 200
            color: "#fb923c"
          - value: 800
            color: "#f87171"
        show:
          icon: true
          state: true
          extrema: true
          fill: true
          legend: false

      # ── Live readings ─────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Live Readings
        icon: mdi:chart-line

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.light_switch_power
            name: Power
            icon: mdi:flash
            icon_color: orange
          - type: custom:mushroom-entity-card
            entity: sensor.light_switch_instantaneous_demand
            name: Demand
            icon: mdi:lightning-bolt
            icon_color: yellow

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.light_switch_voltage
            name: Voltage
            icon: mdi:sine-wave
            icon_color: blue
          - type: custom:mushroom-entity-card
            entity: sensor.light_switch_current
            name: Current
            icon: mdi:current-ac
            icon_color: green

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.light_switch_summation_delivered
            name: Total Energy
            icon: mdi:counter
            icon_color: teal
          - type: custom:mushroom-entity-card
            entity: sensor.light_switch_power_factor
            name: Power Factor
            icon: mdi:angle-acute
            icon_color: purple

      - type: custom:mushroom-entity-card
        entity: sensor.light_switch_ac_frequency
        name: AC Frequency
        icon: mdi:waveform
        icon_color: indigo
        layout: horizontal

      # ── Control ───────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Control
        icon: mdi:toggle-switch

      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: switch.light_switch
        name: Light Switch
        icon: mdi:toggle-switch-variant
        styles: |
          .bubble-icon-container {
            background: rgba(234, 179, 8, ${state === 'on' ? '0.35' : '0.1'}) !important;
          }
          .bubble-icon { color: rgb(234, 179, 8) !important; }

      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: input_boolean.light_auto_mode
        name: Auto Schedule
        icon: mdi:calendar-sync
        styles: |
          .bubble-icon-container {
            background: rgba(34, 197, 94, ${state === 'on' ? '0.35' : '0.1'}) !important;
          }
          .bubble-icon { color: rgb(34, 197, 94) !important; }

      # ── Navigation ────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: horizontal-buttons-stack
        auto_order: true
        1_name: Home
        1_icon: mdi:home-variant
        1_link: /rounded-home/home
        1_entity: person.jay
        2_name: Nursery
        2_icon: mdi:baby-carriage
        2_link: /rounded-home/nursery
        2_entity: binary_sensor.nursery_baby_crying
        2_pir_sensor: binary_sensor.nursery_motion
        3_name: Energy
        3_icon: mdi:lightning-bolt
        3_link: /rounded-home/energy
        3_entity: switch.light_switch
        4_name: System
        4_icon: mdi:cog-outline
        4_link: /rounded-home/system

  ##############################################################################
  # VIEW 4: SYSTEM
  ##############################################################################
  - title: System
    path: system
    icon: mdi:cog-outline
    type: masonry
    cards:
      - type: custom:mushroom-title-card
        title: System
        subtitle: Updates, backups & device status

      # ── iPhone ────────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Jay's iPhone
        icon: mdi:cellphone

      - type: custom:mushroom-template-card
        primary: "Jay's iPhone"
        secondary: >
          {{ states('sensor.sujis_iphone_battery_level') }}% · {{ states('sensor.sujis_iphone_battery_state') }}
        icon: mdi:cellphone
        icon_color: >
          {% set b = states('sensor.sujis_iphone_battery_level') | int(0) %}
          {% if b > 60 %}green{% elif b > 20 %}amber{% else %}red{% endif %}
        badge_icon: >
          {% if states('sensor.sujis_iphone_battery_state') == 'Charging' %}mdi:lightning-bolt{% endif %}
        badge_color: green
        layout: horizontal

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: sensor.sujis_iphone_connection_type
            icon: mdi:wifi
            icon_color: blue
            content: "{{ states('sensor.sujis_iphone_connection_type') }}"
          - type: template
            entity: sensor.sujis_iphone_ssid
            icon: mdi:access-point
            icon_color: teal
            content: "{{ states('sensor.sujis_iphone_ssid') }}"

      # ── Backup ────────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Backup
        icon: mdi:backup-restore

      - type: custom:mushroom-template-card
        primary: Backup Manager
        secondary: "{{ states('sensor.backup_backup_manager_state') | title }}"
        icon: mdi:backup-restore
        icon_color: >
          {% set s = states('sensor.backup_backup_manager_state') %}
          {% if s == 'idle' %}green{% elif s == 'backing_up' %}blue{% else %}orange{% endif %}
        layout: horizontal

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.backup_last_successful_automatic_backup
            name: Last Backup
            icon: mdi:check-circle
            icon_color: green
          - type: custom:mushroom-entity-card
            entity: sensor.backup_next_scheduled_automatic_backup
            name: Next Backup
            icon: mdi:clock-outline
            icon_color: blue

      # ── Updates ───────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Pending Updates
        icon: mdi:update

      - type: custom:auto-entities
        card:
          type: entities
          show_header_toggle: false
        filter:
          include:
            - domain: update
              state: "on"
              options:
                type: custom:mushroom-update-card
                collapsible_controls: true
        sort:
          method: friendly_name
        show_empty: false

      - type: custom:auto-entities
        card:
          type: entities
          title: All Components
          show_header_toggle: false
        filter:
          include:
            - domain: update
              state: "off"
              options:
                type: custom:mushroom-update-card
        sort:
          method: friendly_name
        show_empty: false

      # ── Navigation ────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: horizontal-buttons-stack
        auto_order: true
        1_name: Home
        1_icon: mdi:home-variant
        1_link: /rounded-home/home
        1_entity: person.jay
        2_name: Nursery
        2_icon: mdi:baby-carriage
        2_link: /rounded-home/nursery
        2_entity: binary_sensor.nursery_baby_crying
        2_pir_sensor: binary_sensor.nursery_motion
        3_name: Energy
        3_icon: mdi:lightning-bolt
        3_link: /rounded-home/energy
        3_entity: switch.light_switch
        4_name: System
        4_icon: mdi:cog-outline
        4_link: /rounded-home/system
