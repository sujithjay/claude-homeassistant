# ── Smart Light Schedule ──────────────────────────────────────────────────────
# Turns light ON 1h before sunrise, OFF 1h after sunrise, and ON 30min before
# sunset. The morning turn-off is skipped if you manually changed the light
# after the automation turned it on (tracked via input_boolean.light_auto_mode).
- id: light_schedule_sun_based
  alias: Smart Light Schedule
  description: >
    Sun-based light schedule with manual override support. Turn-on events always
    run. The morning turn-off is skipped if a manual change was detected since
    the last auto turn-on. Evening turn-off at 10 PM is also skipped on
    manual override.
  trigger:
    - platform: sun
      event: sunrise
      offset: "-01:00:00"
      id: morning_on
    - platform: sun
      event: sunrise
      offset: "01:00:00"
      id: morning_off
    - platform: sun
      event: sunset
      offset: "-00:30:00"
      id: evening_on
    - platform: time
      at: "22:00:00"
      id: evening_off
  action:
    - choose:
        # ── Turn ON (always scheduled) ────────────────────────────────────────
        - conditions:
            - condition: trigger
              id:
                - morning_on
                - evening_on
          sequence:
            - service: switch.turn_on
              entity_id: switch.light_switch
            - service: input_boolean.turn_on
              entity_id: input_boolean.light_auto_mode
        # ── Turn OFF (only if automation was last in control) ─────────────────
        - conditions:
            - condition: trigger
              id: morning_off
            - condition: state
              entity_id: input_boolean.light_auto_mode
              state: "on"
          sequence:
            - service: switch.turn_off
              entity_id: switch.light_switch
            - service: input_boolean.turn_off
              entity_id: input_boolean.light_auto_mode
        # ── Evening OFF (only if automation was last in control) ────────────
        - conditions:
            - condition: trigger
              id: evening_off
            - condition: state
              entity_id: input_boolean.light_auto_mode
              state: "on"
          sequence:
            - service: switch.turn_off
              entity_id: switch.light_switch
            - service: input_boolean.turn_off
              entity_id: input_boolean.light_auto_mode
  mode: single

# ── Light Schedule Recovery ──────────────────────────────────────────────────
# If the switch goes unavailable (device offline) and recovers during a
# scheduled-on window, turn it on. Covers connectivity drops that cause
# the main schedule's service call to be silently dropped.
- id: light_schedule_recovery
  alias: Light Schedule Recovery
  description: >
    When the light switch recovers from unavailable during a scheduled-on
    window (morning or evening), turn it on and set auto_mode. This catches
    cases where the main schedule fired but the device was unreachable.
  trigger:
    - platform: state
      entity_id: switch.light_switch
      from: "unavailable"
  condition:
    - condition: or
      conditions:
        # Morning window: 1h before sunrise → 1h after sunrise
        - condition: sun
          after: sunrise
          after_offset: "-01:00:00"
          before: sunrise
          before_offset: "01:00:00"
        # Evening window: 30min before sunset → 10 PM
        - condition: and
          conditions:
            - condition: sun
              after: sunset
              after_offset: "-00:30:00"
            - condition: time
              before: "22:00:00"
  action:
    - service: switch.turn_on
      entity_id: switch.light_switch
    - service: input_boolean.turn_on
      entity_id: input_boolean.light_auto_mode
  mode: single

# ── Manual Override Detector ──────────────────────────────────────────────────
# Watches for human-triggered changes to the light switch and clears the
# auto_mode flag so the next scheduled turn-off is skipped.
- id: light_manual_override_detect
  alias: Light Manual Override Detection
  description: >
    Clears light_auto_mode when the switch is changed by a person (not an
    automation), so the morning auto-off will be skipped.
  trigger:
    - platform: state
      entity_id: switch.light_switch
  condition:
    - condition: template
      value_template: "{{ trigger.to_state.context.user_id is not none }}"
  action:
    - service: input_boolean.turn_off
      entity_id: input_boolean.light_auto_mode
  mode: single

# ── Baby Cry Alert ─────────────────────────────────────────────────────────────
# Sends a rich iOS notification with a camera snapshot when the baby cry sensor
# triggers between 7 PM and 10 PM. A 5-second delay filters out brief triggers.
# NOTE: Enable camera.nursery_snapshots_clear in HA entity registry for images.
- id: nursery_baby_cry_alert
  alias: Nursery Baby Cry Alert
  description: >
    Sends a critical iOS push notification with a Reolink camera snapshot when
    baby crying is detected between 7 PM and 10 PM. Uses a 5-second debounce
    to filter momentary triggers. Notification includes an action button to
    open the Nursery dashboard view.
  trigger:
    - platform: state
      entity_id: binary_sensor.nursery_baby_crying
      to: "on"
      for:
        seconds: 5
  condition:
    - condition: template
      value_template: >
        {% set now_t = now().strftime('%H:%M:%S') %}
        {% set start = states('input_datetime.nursery_alert_start') %}
        {% set end   = states('input_datetime.nursery_alert_end') %}
        {{ start <= now_t < end }}
  action:
    - service: notify.mobile_app_sujis_iphone
      data:
        title: "Baby is crying"
        message: "Detected in the nursery"
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          entity_id: camera.nursery_snapshots_clear
          attachment:
            url: /api/camera_proxy/camera.nursery_snapshots_clear
            content_type: image/jpeg
          actions:
            - action: URI
              title: "Open Nursery"
              uri: /rounded-home/nursery
  mode: single
